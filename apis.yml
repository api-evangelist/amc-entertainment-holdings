aid: amc-entertainment-holdings
name: AMC Entertainment Holdings
description: >-
  AMC Entertainment Holdings is the largest movie exhibition company in the
  United States and the world, operating AMC Theatres, AMC Stubs loyalty
  programs, and related entertainment brands. AMC publishes a public developer
  portal at developers.amctheatres.com that exposes data on movies, showtimes,
  theatres, and ticketing for partner integration. The API is REST-based and
  is the primary integration surface for distributors, partners, and third-party
  developers building movie discovery and ticketing experiences.
