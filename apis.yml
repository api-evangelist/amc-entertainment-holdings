apis:
  - aid: amc-entertainment-holdings:amc-theatres-api
    name: AMC Theatres API
    description: >-
      The AMC Theatres API is a public REST API providing programmatic access
      to AMC Theatres data including theatres, locations, showtimes, movies,
      and related metadata. The API is intended for partner integrations such
      as movie discovery, ticketing, and entertainment listings. Access is
      controlled via API keys obtained through the AMC developer portal.
