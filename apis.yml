aid: amc-entertainment-holdings
name: AMC Entertainment Holdings
description: >-
  AMC Entertainment Holdings is the largest movie exhibition company in the United States and the world, operating AMC
  Theatres, AMC Stubs loyalty programs, and related entertainment brands. AMC publishes a public developer portal at
  developers.amctheatres.com that exposes a REST API for movies, showtimes, theatres, locations, seating, ticketing,
  concessions, AMC Stubs loyalty, refunds, fee waivers, barcodes, and webhooks. The API is the primary integration
  surface for distributors, partners, and third-party developers building movie discovery, ticket sales, and AMC Stubs
  co-marketing experiences.
type: Index
