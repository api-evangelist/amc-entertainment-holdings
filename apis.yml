apis:
  - aid: amc-entertainment-holdings:amc-theatres-api
    name: AMC Theatres API
    description: >-
      The AMC Theatres API is a public REST API providing programmatic access to AMC Theatres data including theatres,
      locations, showtimes, movies, seating, ticketing, concessions, and AMC Stubs loyalty. The API is intended for
      partner integrations such as movie discovery, ticketing, and entertainment listings. Authentication is performed
      via a vendor API key issued through the AMC developer portal and supplied in the X-AMC-Vendor-Key header. Resource
      families are versioned independently under /v1, /v2, /v3, and /v4 path prefixes, and collection responses use a
      HAL-style envelope.
    humanURL: https://developers.amctheatres.com
    baseURL: https://api.amctheatres.com
