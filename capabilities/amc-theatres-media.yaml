naftiko: 1.0.0-alpha2
info:
  label: AMC Theatres API — Media
  description: 'AMC Theatres API — Media. 5 operations. Lead operation: List Image Sizes. Self-contained Naftiko capability
    covering one Amc Entertainment Holdings business surface.'
  tags:
  - Amc Entertainment Holdings
  - Media
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMC_ENTERTAINMENT_HOLDINGS_API_KEY: AMC_ENTERTAINMENT_HOLDINGS_API_KEY
capability:
  consumes:
  - type: http
    namespace: amc-theatres-media
    baseUri: https://api.amctheatres.com
    description: AMC Theatres API — Media business capability. Self-contained, no shared references.
    resources:
    - name: v2-images-sizes
      path: /v2/images/sizes
      operations:
      - name: listimagesizes
        method: GET
        description: List Image Sizes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-media-images-content-types
      path: /v2/media/images/content-types
      operations:
      - name: listimagecontenttypes
        method: GET
        description: List Image Content Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-media-videos-content-types
      path: /v2/media/videos/content-types
      operations:
      - name: listvideocontenttypes
        method: GET
        description: List Video Content Types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v2-media-media-type-media-id
      path: /v2/media/{media-type}/{media-id}
      operations:
      - name: getmediaitem
        method: GET
        description: Get Media By Type and Id
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: media-type
          in: path
          type: string
          required: true
        - name: media-id
          in: path
          type: string
          required: true
    - name: v2-media-resource-type-resource-id-media-type
      path: /v2/media/{resource-type}/{resource-id}/{media-type}
      operations:
      - name: listmediaforresource
        method: GET
        description: List Media for a Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resource-type
          in: path
          type: string
          required: true
        - name: resource-id
          in: path
          type: string
          required: true
        - name: media-type
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: X-AMC-Vendor-Key
      value: '{{env.AMC_ENTERTAINMENT_HOLDINGS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amc-theatres-media-rest
    port: 8080
    description: REST adapter for AMC Theatres API — Media. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/images/sizes
      name: v2-images-sizes
      description: REST surface for v2-images-sizes.
      operations:
      - method: GET
        name: listimagesizes
        description: List Image Sizes
        call: amc-theatres-media.listimagesizes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/media/images/content-types
      name: v2-media-images-content-types
      description: REST surface for v2-media-images-content-types.
      operations:
      - method: GET
        name: listimagecontenttypes
        description: List Image Content Types
        call: amc-theatres-media.listimagecontenttypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/media/videos/content-types
      name: v2-media-videos-content-types
      description: REST surface for v2-media-videos-content-types.
      operations:
      - method: GET
        name: listvideocontenttypes
        description: List Video Content Types
        call: amc-theatres-media.listvideocontenttypes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/media/{media-type}/{media-id}
      name: v2-media-media-type-media-id
      description: REST surface for v2-media-media-type-media-id.
      operations:
      - method: GET
        name: getmediaitem
        description: Get Media By Type and Id
        call: amc-theatres-media.getmediaitem
        with:
          media-type: rest.media-type
          media-id: rest.media-id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/media/{resource-type}/{resource-id}/{media-type}
      name: v2-media-resource-type-resource-id-media-type
      description: REST surface for v2-media-resource-type-resource-id-media-type.
      operations:
      - method: GET
        name: listmediaforresource
        description: List Media for a Resource
        call: amc-theatres-media.listmediaforresource
        with:
          resource-type: rest.resource-type
          resource-id: rest.resource-id
          media-type: rest.media-type
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amc-theatres-media-mcp
    port: 9090
    transport: http
    description: MCP adapter for AMC Theatres API — Media. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-image-sizes
      description: List Image Sizes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-media.listimagesizes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-image-content-types
      description: List Image Content Types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-media.listimagecontenttypes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-video-content-types
      description: List Video Content Types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-media.listvideocontenttypes
      outputParameters:
      - type: object
        mapping: $.
    - name: get-media-type-and-id
      description: Get Media By Type and Id
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-media.getmediaitem
      with:
        media-type: tools.media-type
        media-id: tools.media-id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-media-resource
      description: List Media for a Resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-media.listmediaforresource
      with:
        resource-type: tools.resource-type
        resource-id: tools.resource-id
        media-type: tools.media-type
      outputParameters:
      - type: object
        mapping: $.
