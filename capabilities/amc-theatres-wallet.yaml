naftiko: 1.0.0-alpha2
info:
  label: AMC Theatres API — Wallet
  description: 'AMC Theatres API — Wallet. 1 operations. Lead operation: Get External Wallet. Self-contained Naftiko capability
    covering one Amc Entertainment Holdings business surface.'
  tags:
  - Amc Entertainment Holdings
  - Wallet
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMC_ENTERTAINMENT_HOLDINGS_API_KEY: AMC_ENTERTAINMENT_HOLDINGS_API_KEY
capability:
  consumes:
  - type: http
    namespace: amc-theatres-wallet
    baseUri: https://api.amctheatres.com
    description: AMC Theatres API — Wallet business capability. Self-contained, no shared references.
    resources:
    - name: v4-amc-accounts-account-id-wallet-views-on-demand
      path: /v4/amc-accounts/{account-id}/wallet/views/on-demand
      operations:
      - name: getexternalwallet
        method: GET
        description: Get External Wallet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-AMC-Vendor-Key
      value: '{{env.AMC_ENTERTAINMENT_HOLDINGS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amc-theatres-wallet-rest
    port: 8080
    description: REST adapter for AMC Theatres API — Wallet. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v4/amc-accounts/{account-id}/wallet/views/on-demand
      name: v4-amc-accounts-account-id-wallet-views-on-demand
      description: REST surface for v4-amc-accounts-account-id-wallet-views-on-demand.
      operations:
      - method: GET
        name: getexternalwallet
        description: Get External Wallet
        call: amc-theatres-wallet.getexternalwallet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amc-theatres-wallet-mcp
    port: 9090
    transport: http
    description: MCP adapter for AMC Theatres API — Wallet. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-external-wallet
      description: Get External Wallet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amc-theatres-wallet.getexternalwallet
      outputParameters:
      - type: object
        mapping: $.
